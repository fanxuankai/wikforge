<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#312E81" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>

  <!-- 装饰光晕 -->
  <circle cx="950" cy="140" r="180" fill="#6366F1" opacity="0.15"/>
  <circle cx="1100" cy="60" r="100" fill="#A855F7" opacity="0.12"/>

  <!-- Logo 方块 -->
  <g transform="translate(80, 80)">
    <rect width="120" height="120" rx="26" fill="url(#logoGrad)"/>
    <path d="M26 38 L42 87 L60 53 L78 87 L94 38" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- 文字主标题 -->
  <text x="240" y="135" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="64" font-weight="800" fill="url(#textGrad)" letter-spacing="-2">Wikforge</text>

  <!-- 副标题 -->
  <text x="240" y="180" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="22" font-weight="500" fill="#A5B4FC" letter-spacing="0.5">企业级知识库系统  ·  RAG · LLM · 智能检索</text>

  <!-- 底部 tag -->
  <g transform="translate(240, 210)">
    <rect width="100" height="28" rx="14" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
    <text x="50" y="19" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#C7D2FE">FastAPI</text>

    <rect x="110" width="105" height="28" rx="14" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
    <text x="162" y="19" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#C7D2FE">Next.js 14</text>

    <rect x="225" width="90" height="28" rx="14" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
    <text x="270" y="19" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#C7D2FE">Qdrant</text>

    <rect x="325" width="120" height="28" rx="14" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
    <text x="385" y="19" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#C7D2FE">OpenSearch</text>

    <rect x="455" width="100" height="28" rx="14" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
    <text x="505" y="19" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#C7D2FE">LiteLLM</text>
  </g>
</svg>
